services:
  backend:
    build: ./backend
    container_name: backend
    volumes:
      - ./backend:/app
      - /app/conda-env  # Prevents conda environment from being overwritten
    secrets:
      - ec2_ssh_key
    ports:
      - "${BACKEND_PORT:-5001}:5001"  # Maps host port to container's 5001
    environment:
      FLASK_ENV: development
      FLASK_DEBUG: "1"  # Enable hot-reloading for development
      PYTHONUNBUFFERED: "1"
      CONDA_DEFAULT_ENV: flask_app_dev_env  # Specify your conda environment name
      EC2_HOST: ${EC2_HOST:?Set EC2_HOST in .env}
      EC2_USER: ${EC2_USER:?Set EC2_USER in .env}
      EC2_SSH_KEY_PATH: /run/secrets/ec2_ssh_key
      DB_HOST: ${DB_HOST:?Set DB_HOST in .env}
      DB_USER: ${DB_USER:?Set DB_USER in .env}
      DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      DB_NAME: ${DB_NAME:-trivia_db}
    restart: unless-stopped
    networks:
      - app-network

  frontend:
    build: ./frontend
    container_name: frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
      REACT_APP_API_BASE_URL: ${REACT_APP_API_BASE_URL:-http://localhost:5001}
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

secrets:
  ec2_ssh_key:
    file: ${EC2_SSH_KEY_HOST_PATH:?Set EC2_SSH_KEY_HOST_PATH in .env to the host path of your SSH private key}
